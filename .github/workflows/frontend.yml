name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/spacexef/**'
      - 'infra/frontend-stack.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/spacexef/**'

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend/spacexef

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: ./frontend/spacexef/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run unit tests
      run: npx vitest run

    - name: Build Next.js app
      run: npm run build

  deploy:
    name: Deploy to AWS
    needs: build_and_test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/spacexef-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/spacexef-frontend:latest \
            ./frontend/spacexef
          docker push $ECR_REGISTRY/spacexef-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/spacexef-frontend:latest

      - name: Deploy CloudFormation stack
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws cloudformation deploy \
            --template-file infra/frontend-stack.yaml \
            --stack-name spaceXef-frontend \
            --parameter-overrides \
              ImageTag=$IMAGE_TAG \
              VpcId=${{ vars.VPC_ID }} \
              SubnetIds=${{ vars.SUBNET_IDS }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
