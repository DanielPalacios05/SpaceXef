AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SpaceXef Frontend - Fargate + ALB
  Deploys the Next.js container behind an Application Load Balancer.

Parameters:
  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy the ALB and Fargate tasks into

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for the ALB and Fargate tasks (at least 2 in different AZs)

  ContainerCpu:
    Type: Number
    Default: 512
    Description: CPU units for the Fargate task (512 = 0.5 vCPU)

  ContainerMemory:
    Type: Number
    Default: 1024
    Description: Memory in MiB for the Fargate task

  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of Fargate tasks to run

Resources:
  # ───────────────────────────────────────────────
  # ECS Cluster
  # ───────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: SpaceXef-Frontend
      ClusterSettings:
        - Name: containerInsights
          Value: disabled

  # ───────────────────────────────────────────────
  # IAM — Task Execution Role
  # ───────────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SpaceXef-FrontendTaskExecRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ───────────────────────────────────────────────
  # CloudWatch Log Group
  # ───────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/spacexef-frontend
      RetentionInDays: 14

  # ───────────────────────────────────────────────
  # ECS Task Definition
  # ───────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: spacexef-frontend
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: frontend
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/spacexef-frontend:${ImageTag}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: API_URL
              Value: !ImportValue SpaceXef-ApiUrl
            - Name: NODE_ENV
              Value: production
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend
          Essential: true

  # ───────────────────────────────────────────────
  # Security Groups
  # ───────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic to the ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB to Fargate tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  # ───────────────────────────────────────────────
  # Application Load Balancer
  # ───────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: SpaceXef-Frontend-ALB
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: SpaceXef-Frontend-TG
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ───────────────────────────────────────────────
  # ECS Service
  # ───────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: spacexef-frontend
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ServiceSecurityGroup
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 3000
          TargetGroupArn: !Ref ALBTargetGroup

Outputs:
  FrontendUrl:
    Description: URL of the frontend ALB
    Value: !Sub "http://${ALB.DNSName}"
    Export:
      Name: SpaceXef-FrontendUrl


