AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SpaceXef ECR Registry stack
  Creates the Elastic Container Registry for the frontend application.

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: spacexef-frontend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

Outputs:
  ECRRepositoryUri:
    Description: ECR repository URI for the frontend image
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: SpaceXef-FrontendECR
